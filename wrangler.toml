name = "arwuchivo"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
# Binding necesario para que el Worker pueda llamar env.ASSETS.fetch()
# cuando run_worker_first está activo.
binding = "ASSETS"
# El Worker corre ANTES de servir assets para que el gate de sesión
# se aplique también a /index.html, /style.css, /js/*, etc.
run_worker_first = true

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "arwuchivo-storage"
